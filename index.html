<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FICOTRANS PLUS - Accueil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Bouton Admin fixe en haut à gauche -->
    <a href="admin.html" class="btn-admin">Administration</a>

    <!-- Section Plein Écran (Fond = Photo) -->
    <div class="hero-fullscreen">
        <div class="slide-container">
            <!-- Les 10 photos en arrière-plan -->
            <img src="photo1.png" alt="Ficotrans Plus 1" class="slide active">
            <img src="photo2.png" alt="Ficotrans Plus 2" class="slide">
            <img src="photo3.png" alt="Ficotrans Plus 3" class="slide">
            <img src="photo4.png" alt="Ficotrans Plus 4" class="slide">
            <img src="photo5.png" alt="Ficotrans Plus 5" class="slide">
            <img src="photo6.png" alt="Ficotrans Plus 6" class="slide">
            <img src="photo7.png" alt="Ficotrans Plus 7" class="slide">
            <img src="photo8.png" alt="Ficotrans Plus 8" class="slide">
            <img src="photo9.png" alt="Ficotrans Plus 9" class="slide">
            <img src="photo10.png" alt="Ficotrans Plus 10" class="slide">
        </div>
        
        <!-- Voile sombre uniforme pour garantir le contraste et la lisibilité du texte -->
        <div class="overlay"></div>

        <!-- Contenu textuel et boutons superposés sur la photo -->
        <div class="content-container">
            
            <!-- Au milieu : Titre principal -->
            <h1 class="main-title">FICOTRANS PLUS</h1>

            <!-- Un peu plus bas : Phrase de confiance -->
            <p class="welcome-text">Pour votre voyage, faites confiance à <span class="highlight">FICOTRANS</span></p>
            
            <!-- Tout en bas au milieu : Bouton Client -->
            <div class="btn-client-container">
                <a href="client.html" class="btn-client">Espace Client / Réservation</a>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
